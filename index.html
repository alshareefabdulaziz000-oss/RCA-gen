<!DOCTYPE html>

<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RCA Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a2332}
header{background:linear-gradient(135deg,#0369a1,#0c4a6e);color:#fff;padding:18px 16px;text-align:center;position:sticky;top:0;z-index:50}
header h1{font-size:17px;font-weight:800}header p{font-size:10px;opacity:.75;margin-top:2px}
.w{max-width:640px;margin:0 auto;padding:12px}.c{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e2e8f0}
.ct{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #38bdf8}
.r{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.rf{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:2px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:13px;background:#f8fafc}
textarea{min-height:50px;resize:vertical}
.sr{display:grid;grid-template-columns:110px 1fr;gap:6px;align-items:center;margin-bottom:4px}.sr span{font-size:10px;font-weight:600;color:#64748b}.sr input{font-size:11px;padding:6px 8px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#15803d,#14532d);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.n{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:11px;color:#1e40af;margin-bottom:12px}
</style></head><body>
<header><h1>RCA Report Generator</h1><p>SPSC + MOH - Aseer Health Cluster</p></header>
<div class="w">
<div class="n"><b>36 error types</b> (24 SPSC + 12 MOH) | NCC MERP A-I</div>
<div class="c"><div class="ct">Hospital &amp; Report</div>
<div class="r rf"><div><label>Hospital</label><select id="hosp"><option>Tubala General Hospital</option><option>Aseer Central Hospital</option><option>Abha Maternity Hospital</option><option>Khamis Mushait General Hospital</option><option>Muhayil General Hospital</option><option>Bisha General Hospital</option><option>Al Namas General Hospital</option><option>Ahad Rafidah General Hospital</option><option>Dhahran Al Janoub General Hospital</option><option value="other">Other</option></select></div></div>
<div class="r rf" id="hospOR" style="display:none"><div><label>Other</label><input id="hospO"></div></div>
<div class="r"><div><label>RCA Type</label><select id="rcaT"><option>Accelerated</option><option>Formal</option></select></div><div><label>Reached Patient?</label><select id="erR"><option>NO</option><option>YES</option></select></div></div>
<div class="r"><div><label>Date Initiated</label><input type="date" id="dI"></div><div><label>Date Completed</label><input type="date" id="dC"></div></div>
<div class="r"><div><label>Rx Type</label><select id="rxT"><option>Wasfaty</option><option>Other</option></select></div><div><label>Ownership</label><select id="own"><option>Ministry of Health</option><option>Private</option></select></div></div></div>
<div class="c"><div class="ct">Patient</div>
<div class="r"><div><label>Name</label><input id="pN"></div><div><label>MRN</label><input id="mrn"></div></div>
<div class="r r3"><div><label>Age</label><input type="number" id="age"></div><div><label>Gender</label><select id="gen"><option>Male</option><option>Female</option></select></div><div><label>Location</label><select id="ward"><option>ER Adult</option><option>ER Pediatric</option><option>Male Medical Ward</option><option>Female Medical Ward</option><option>ICU</option><option>NICU</option><option>Pediatric Ward</option><option>OBGYN Ward</option><option>Outpatient Pharmacy</option><option>Inpatient Pharmacy</option><option>Operation Unit</option><option>Internal Medicine Clinic</option><option>Family Clinic</option><option>Laboratory</option></select></div></div>
<div class="r rf"><div><label>Diagnosis</label><input id="cc"></div></div></div>
<div class="c"><div class="ct">Error Details</div>
<div class="r"><div><label>Stage</label><select id="stg"><option>Prescribing</option><option>Transcribing</option><option>Dispensing</option><option>Preparation</option><option>Administration</option><option>Monitoring</option></select></div><div><label>Error Type</label><select id="eT"><optgroup label="Prescribing"><option value="0">Wrong/Missed Dose</option><option value="1">Wrong Frequency</option></optgroup><optgroup label="Dispensing"><option value="2">Wrong Strength</option></optgroup><optgroup label="Prescribing"><option value="3">Wrong Medication</option></optgroup><optgroup label="Dispensing"><option value="4">Wrong Dosage Form</option></optgroup><optgroup label="Preparation"><option value="5">Wrong Preparation</option></optgroup><optgroup label="Prescribing"><option value="6">Wrong Route</option></optgroup><optgroup label="Administration"><option value="7">Wrong Rate</option></optgroup><optgroup label="Prescribing"><option value="8">Wrong Duration</option></optgroup><optgroup label="Monitoring"><option value="9">Missed TDM</option></optgroup><optgroup label="Administration"><option value="10">Wrong Time</option></optgroup><optgroup label="Prescribing"><option value="11">Missing Indication</option><option value="12">Contraindication</option><option value="13">Drug-Drug Interaction</option><option value="14">Drug-Disease</option></optgroup><optgroup label="Monitoring"><option value="15">Drug-Food</option></optgroup><optgroup label="Dispensing"><option value="16">Wrong Storage</option></optgroup><optgroup label="Prescribing"><option value="17">Allergy</option></optgroup><optgroup label="Dispensing"><option value="18">Expired Product</option></optgroup><optgroup label="Prescribing"><option value="19">Duplication</option></optgroup><optgroup label="Dispensing"><option value="20">Delivery Delay</option></optgroup><optgroup label="Administration"><option value="21">Wrong Technique</option><option value="22">Wrong Patient</option><option value="23">Wrong Site</option></optgroup><optgroup label="Prescribing"><option value="24">Outside Privilege</option><option value="25">High-Alert Violation</option><option value="26">Verbal Order Violation</option><option value="27">CS Violation</option><option value="28">Non-Formulary</option><option value="29">Incomplete Rx</option><option value="30">Pediatric Dosing</option></optgroup><optgroup label="Transcribing"><option value="31">Transcription Error</option></optgroup><optgroup label="Monitoring"><option value="32">ADR Not Reported</option><option value="33">Documentation Failure</option></optgroup><optgroup label="Dispensing"><option value="34">Incorrect Labeling</option><option value="35">Recalled Med</option></optgroup></select></div></div>
<div class="r rf"><div><label>Medication(s)</label><input id="meds"></div></div>
<div class="r rf"><div><label>Description</label><textarea id="notes" rows="2"></textarea></div></div>
<div class="r rf"><div><label>Action Taken</label><select id="act" multiple size="3"><option>Call physician</option><option>Policies changed</option><option>Staff awareness</option><option>Education provided</option><option>Root cause analysis</option><option>Report to supervisor</option><option>Environment modified</option></select></div></div>
<div class="r r3"><div><label>Date</label><input type="date" id="iD"></div><div><label>Time</label><input type="time" id="iT"></div><div><label>Shift</label><select id="sh"><option>PM</option><option>AM</option><option>Night</option></select></div></div></div>
<div class="c"><div class="ct">NCC MERP Severity</div>
<div class="r rf"><div><label>Category</label><select id="sev"><option value="0">Category A - Capacity to cause error</option><option value="1">Category B - Error did not reach patient</option><option value="2">Category C - Reached patient, no harm</option><option value="3">Category D - Required monitoring</option><option value="4">Category E - Temporary harm</option><option value="5">Category F - Hospitalization needed</option><option value="6">Category G - Permanent harm</option><option value="7">Category H - Life-sustaining needed</option><option value="8">Category I - Contributed to death</option></select></div></div>
<div class="r rf"><div><label>Responsible</label><input id="resp" value="Medical Director"></div></div></div>
<div class="c"><div class="ct">Signatures</div>
<div class="sr"><span>Prepared by:</span><input id="s1"></div><div class="sr"><span>Title:</span><input id="s1r"></div>
<div class="sr"><span>Pharm Mgr:</span><input id="s2"></div><div class="sr"><span>Quality:</span><input id="s3"></div>
<div class="sr"><span>Dir QM:</span><input id="s4"></div><div class="sr"><span>Med Dir:</span><input id="s5"></div></div>
<button class="btn" id="gB" onclick="go()">Generate RCA Report (PDF)</button>
</div>
<script>
var now=new Date();
document.getElementById("dI").value=now.toISOString().split("T")[0];
document.getElementById("iD").value=now.toISOString().split("T")[0];
var c2=new Date(now);c2.setDate(c2.getDate()+4);
document.getElementById("dC").value=c2.toISOString().split("T")[0];
document.getElementById("hosp").onchange=function(){document.getElementById("hospOR").style.display=this.value==="other"?"block":"none"};
window.onerror=function(m,s,l){alert("JS Error line "+l+": "+m)};
</script>
</body></html>
