<!DOCTYPE html>

<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RCA Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a2332}
header{background:#0c4a6e;color:#fff;padding:18px;text-align:center}
header h1{font-size:17px}header p{font-size:11px;opacity:.8;margin-top:3px}
.w{max-width:640px;margin:0 auto;padding:12px}
.c{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #e2e8f0}
.ct{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #38bdf8}
.r{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.rf{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:3px}
input,select,textarea{width:100%;padding:9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;font-family:inherit}
textarea{min-height:50px}
.sr{display:grid;grid-template-columns:110px 1fr;gap:6px;margin-bottom:5px;align-items:center}
.sr span{font-size:11px;color:#64748b;font-weight:600}
.btn{display:block;width:100%;padding:16px;background:#15803d;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;margin:10px 0;text-align:center;text-decoration:none;cursor:pointer}
.btn:active{background:#14532d}
#report{display:none}
#report.show{display:block;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;overflow:auto;z-index:9999;padding:15px}
#report h1{color:#0369a1;font-size:18px;text-align:center;margin:8px 0}
#report h2{background:#0369a1;color:#fff;padding:5px 10px;font-size:13px;margin:12px 0 6px}
#report h3{color:#0369a1;font-size:12px;border-bottom:1px solid #0369a1;padding:3px 0;margin:10px 0 5px}
#report table{width:100%;border-collapse:collapse;margin:6px 0;font-size:11px}
#report td,#report th{border:1px solid #ccc;padding:5px 7px;text-align:left}
#report th{background:#0c4a6e;color:#fff}
#report .sev{background:#e8f5e9;padding:8px;border-radius:5px;border:1px solid #a5d6a7;font-size:11px}
#report .row{margin:4px 0;font-size:11px}#report .row b{display:inline-block;min-width:110px}
#report .fb td{background:#f8fafc;vertical-align:top;font-size:10px;width:25%}
#report .sub{font-size:9px;color:#666;text-align:center;margin:4px 0}
#report .hdr{display:flex;justify-content:space-between;border-bottom:2px solid #0369a1;padding-bottom:8px;margin-bottom:8px;font-size:10px}
#report .actions{position:sticky;top:0;background:#f0f4f8;padding:10px;margin:-15px -15px 10px;border-bottom:1px solid #ccc}
#report .actions button{padding:12px 20px;font-size:15px;background:#15803d;color:#fff;border:none;border-radius:8px;font-weight:bold;margin-right:8px}
#report .actions button.close{background:#64748b}
@media print{#form{display:none}#report .actions{display:none}#report.show{position:static;padding:10mm}body{background:#fff}}
</style></head><body>
<div id="form">
<header><h1>RCA Report Generator</h1><p>SPSC + MOH - Aseer Health Cluster</p></header>
<div class="w">
<div class="c"><div class="ct">Hospital &amp; Report</div>
<div class="r rf"><div><label>Hospital</label><select id="hosp"><option>Tubala General Hospital</option><option>Aseer Central Hospital</option><option>Abha Maternity Hospital</option><option>Khamis Mushait General Hospital</option><option>Muhayil General Hospital</option><option>Bisha General Hospital</option><option>Al Namas General Hospital</option><option>Ahad Rafidah General Hospital</option><option>Dhahran Al Janoub General Hospital</option><option value="other">Other</option></select></div></div>
<div class="r rf" id="hospOR" style="display:none"><div><label>Other</label><input id="hospO"></div></div>
<div class="r"><div><label>RCA Type</label><select id="rcaT"><option>Accelerated</option><option>Formal</option></select></div><div><label>Reached Patient?</label><select id="erR"><option>NO</option><option>YES</option></select></div></div>
<div class="r"><div><label>Date Initiated</label><input type="date" id="dI"></div><div><label>Date Completed</label><input type="date" id="dC"></div></div>
<div class="r"><div><label>Rx Type</label><select id="rxT"><option>Wasfaty</option><option>Other</option></select></div><div><label>Ownership</label><select id="own"><option>Ministry of Health</option><option>Private</option></select></div></div></div>
<div class="c"><div class="ct">Patient</div>
<div class="r"><div><label>Name</label><input id="pN"></div><div><label>MRN</label><input id="mrn"></div></div>
<div class="r r3"><div><label>Age</label><input type="number" id="age"></div><div><label>Gender</label><select id="gen"><option>Male</option><option>Female</option></select></div><div><label>Location</label><select id="ward"><option>ER Adult</option><option>ER Pediatric</option><option>Male Medical Ward</option><option>Female Medical Ward</option><option>ICU</option><option>NICU</option><option>Pediatric Ward</option><option>OBGYN Ward</option><option>Outpatient Pharmacy</option><option>Inpatient Pharmacy</option><option>Operation Unit</option><option>Internal Medicine Clinic</option><option>Family Clinic</option><option>Laboratory</option></select></div></div>
<div class="r rf"><div><label>Diagnosis</label><input id="cc"></div></div></div>
<div class="c"><div class="ct">Error Details</div>
<div class="r"><div><label>Stage</label><select id="stg"><option>Prescribing</option><option>Transcribing</option><option>Dispensing</option><option>Preparation</option><option>Administration</option><option>Monitoring</option></select></div><div><label>Error Type</label><select id="eT"><optgroup label="Prescribing"><option value="0">Wrong/Missed Dose</option><option value="1">Wrong Frequency</option></optgroup><optgroup label="Dispensing"><option value="2">Wrong Strength</option></optgroup><optgroup label="Prescribing"><option value="3">Wrong Medication</option></optgroup><optgroup label="Dispensing"><option value="4">Wrong Dosage Form</option></optgroup><optgroup label="Preparation"><option value="5">Wrong Preparation</option></optgroup><optgroup label="Prescribing"><option value="6">Wrong Route</option></optgroup><optgroup label="Administration"><option value="7">Wrong Rate</option></optgroup><optgroup label="Prescribing"><option value="8">Wrong Duration</option></optgroup><optgroup label="Monitoring"><option value="9">Missed TDM</option></optgroup><optgroup label="Administration"><option value="10">Wrong Time</option></optgroup><optgroup label="Prescribing"><option value="11">Missing Indication</option><option value="12">Contraindication</option><option value="13">Drug-Drug Interaction</option><option value="14">Drug-Disease</option></optgroup><optgroup label="Monitoring"><option value="15">Drug-Food</option></optgroup><optgroup label="Dispensing"><option value="16">Wrong Storage</option></optgroup><optgroup label="Prescribing"><option value="17">Allergy</option></optgroup><optgroup label="Dispensing"><option value="18">Expired Product</option></optgroup><optgroup label="Prescribing"><option value="19">Duplication</option></optgroup><optgroup label="Dispensing"><option value="20">Delivery Delay</option></optgroup><optgroup label="Administration"><option value="21">Wrong Technique</option><option value="22">Wrong Patient</option><option value="23">Wrong Site</option></optgroup><optgroup label="Prescribing"><option value="24">Outside Privilege</option><option value="25">High-Alert</option><option value="26">Verbal Order</option><option value="27">CS Violation</option><option value="28">Non-Formulary</option><option value="29">Incomplete Rx</option><option value="30">Pediatric Dosing</option></optgroup><optgroup label="Transcribing"><option value="31">Transcription</option></optgroup><optgroup label="Monitoring"><option value="32">ADR Not Reported</option><option value="33">Doc Failure</option></optgroup><optgroup label="Dispensing"><option value="34">Incorrect Labeling</option><option value="35">Recalled Med</option></optgroup></select></div></div>
<div class="r rf"><div><label>Medication(s)</label><input id="meds"></div></div>
<div class="r rf"><div><label>Description</label><textarea id="notes" rows="2"></textarea></div></div>
<div class="r r3"><div><label>Date</label><input type="date" id="iD"></div><div><label>Time</label><input type="time" id="iT"></div><div><label>Shift</label><select id="sh"><option>PM</option><option>AM</option><option>Night</option></select></div></div></div>
<div class="c"><div class="ct">NCC MERP Severity</div>
<div class="r rf"><div><label>Category</label><select id="sev"><option value="0">Category A - Capacity to cause error</option><option value="1">Category B - Did not reach patient</option><option value="2">Category C - Reached patient, no harm</option><option value="3">Category D - Required monitoring</option><option value="4">Category E - Temporary harm</option><option value="5">Category F - Hospitalization</option><option value="6">Category G - Permanent harm</option><option value="7">Category H - Life-sustaining</option><option value="8">Category I - Death</option></select></div></div>
<div class="r rf"><div><label>Responsible</label><input id="resp" value="Medical Director"></div></div></div>
<div class="c"><div class="ct">Signatures</div>
<div class="sr"><span>Prepared by:</span><input id="s1"></div>
<div class="sr"><span>Title:</span><input id="s1r"></div>
<div class="sr"><span>Pharm Mgr:</span><input id="s2"></div>
<div class="sr"><span>Quality:</span><input id="s3"></div>
<div class="sr"><span>Dir QM:</span><input id="s4"></div>
<div class="sr"><span>Med Dir:</span><input id="s5"></div></div>
<button class="btn" id="gB" type="button">Generate RCA Report</button>
</div></div>
<div id="report"><div class="actions"><button id="printBtn" type="button">Save as PDF / Print</button><button class="close" id="closeBtn" type="button">Back</button></div><div id="reportBody"></div></div>

m":["No duration"],"ft":["No alerts"],"fe":["High volume"],"fh":["Knowledge gap"]},{"l":"Missed TDM","s":"Monitoring","p":"Missed TDM","c":"MM.16","d":"failed to initiate TDM","r":"No TDM prompts","fm":["TDM not ordered"],"ft":["No prompts"],"fe":["High volume"],"fh":["Knowledge gap"]},{"l":"Wrong Time","s":"Administration","p":"Wrong Time","c":"MM.15","d":"administered outside window","r":"No timing alerts","fm":["Dose omitted"],"ft":["Paper MAR"],"fe":["High ratio"],"fh":["Overload"]},{"l":"Missing Indication","s":"Prescribing","p":"Missing indication","c":"MM.5.3.3","d":"prescribed without indication","r":"Not documented","fm":["No indication"],"ft":["No field"],"fe":["High volume"],"fh":["Policy gap"]},{"l":"Contraindication","s":"Prescribing","p":"Contraindication","c":"MM.3","d":"prescribed despite contraindication","r":"No screening","fm":["Not screened"],"ft":["No alerts"],"fe":["Emergency"],"fh":["Knowledge gap"]},{"l":"Drug-Drug Interaction","s":"Prescribing","p":"DDI","c":"MM.3","d":"prescribed with DDI","r":"No reconciliation","fm":["Not assessed"],"ft":["No database"],"fe":["Multiple Rx"],"fh":["Knowledge gap"]},{"l":"Drug-Disease","s":"Prescribing","p":"Drug-disease","c":"MM.3","d":"prescribed ignoring drug-disease","r":"Not assessed","fm":["Not assessed"],"ft":["No alerts"],"fe":["Incomplete hx"],"fh":["Knowledge gap"]},{"l":"Drug-Food","s":"Monitoring","p":"Drug-food","c":"MM.16","d":"no drug-food counseling","r":"No counseling","fm":["No counseling"],"ft":["No references"],"fe":["Language"],"fh":["Knowledge gap"]},{"l":"Wrong Storage","s":"Dispensing","p":"Wrong Storage","c":"MM.13","d":"stored incorrectly","r":"Inadequate monitoring","fm":["Wrong conditions"],"ft":["Monitor failure"],"fe":["Infrastructure"],"fh":["Training gap"]},{"l":"Allergy","s":"Prescribing","p":"Documented Allergy","c":"MM.3","d":"prescribed despite allergy","r":"Allergy not verified","fm":["Not verified"],"ft":["No system"],"fe":["Emergency"],"fh":["Communication"]},{"l":"Exp "],"fe":["After-hours"],"fh":["Unfamiliarity"]},{"l":"Non-Formulary","s":"Prescribing","p":"Formulary","c":"MM.6","d":"prescribed no PTC approval","r":"Approval bypassed","fm":["Bypassed"],"ft":["Inaccessible"],"fe":["Urgent"],"fh":["Unfamiliarity"]},{"l":"Incomplete Rx","s":"Prescribing","p":"Rx Standards","c":"MM.7","d":"Rx missing elements","r":"Incomplete","fm":["Incomplete"],"ft":["No fields"],"fe":["High volume"],"fh":["Knowledge gap"]},{"l":"Pediatric Dosing","s":"Prescribing","p":"Pediatric Safety","c":"MM.3","d":"prescribed no wt-based calc","r":"No wt-based calc","fm":["No calc"],"ft":["No calculator"],"fe":["Mixed dept"],"fh":["Training gap"]},{"l":"Transcription","s":"Transcribing","p":"Transcription","c":"MM.3","d":"transcription error","r":"Manual verification","fm":["Error"],"ft":["No CPOE"],"fe":["Interruptions"],"fh":["Training gap"]},{"l":"ADR Not Reported","s":"Monitoring","p":"Pharmacovigilance","c":"MM.16","d":"ADR not reported","r":"Not recognized","fm":["Not recognized"],"ft":["Inaccessible"],"fe":["Workload"],"fh":["PV gap"]},{"l":"Doc Failure","s":"Monitoring","p":"Documentation","c":"MM.15","d":"incomplete docs","r":"Poor documentation","fm":["Incomplete"],"ft":["Paper-based"],"fe":["Workload"],"fh":["Training gap"]},{"l":"Incorrect Labeling","s":"Dispensing","p":"Labeling","c":"MM.12","d":"incorrect label","r":"Not verified","fm":["Incomplete"],"ft":["System limits"],"fe":["Volume"],"fh":["Haste"]},{"l":"Recalled Med","s":"Dispensing","p":"Recall","c":"MM.30","d":"recalled not removed","r":"Not actioned","fm":["Not actioned"],"ft":["Gaps"],"fe":["Decentralized"],"fh":["Unknown"]}]</script>

<script>
(function(){
var EE=JSON.parse(document.getElementById("errData").textContent);
var SS=JSON.parse(document.getElementById("sevData").textContent);
function V(id){return document.getElementById(id).value.trim()}
function fD(d){if(!d)return"";var x=new Date(d);var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return m[x.getMonth()]+" "+x.getDate()+", "+x.getFullYear()}

function buildReport(){
var t=EE[parseInt(V(“eT”))];
var sv=SS[parseInt(V(“sev”))];
var hosp=V(“hosp”);if(hosp===“other”)hosp=V(“hospO”);
var pn=V(“pN”),mrn=V(“mrn”),age=V(“age”),gen=V(“gen”),ward=V(“ward”),cc=V(“cc”);
var meds=V(“meds”),notes=V(“notes”),resp=V(“resp”)||“Medical Director”;
var stage=V(“stg”);
var desc=t.d+” “+meds;
var ev=age+”-year-old “+gen.toLowerCase()+” patient (MRN: “+mrn+”) presented to “+ward+” with “+cc+”. During “+stage.toLowerCase()+”, “+desc+”.”+(notes?” “+notes:””);
var yr=new Date().getFullYear();

var h=””;
h+=’<div class="hdr"><div><b>Kingdom of Saudi Arabia</b><br><b style="color:#0369a1">Aseer Health Cluster</b><br><span style="font-weight:bold">’+hosp+’</span></div><div style="text-align:right"><b style="color:#0369a1">تجمع عسير الصحي</b></div></div>’;
h+=’<h1>Root Cause Analysis Report</h1>’;
h+=’<div class="sub">Medication Safety | SPSC + MOH | RCA-’+mrn+’-’+yr+’ | CBAHI: ‘+t.c+’ | ‘+t.p+’</div>’;
h+=’<table><tr><th>’+V(“rcaT”)+’ RCA</th><th>’+fD(V(“dI”))+’ to ‘+fD(V(“dC”))+’</th><th>’+stage+’</th></tr>’;
h+=’<tr><td>Patient: ‘+pn+’ (’+age+‘y, ‘+gen+’)</td><td>MRN: ‘+mrn+’</td><td>’+ward+’</td></tr>’;
h+=’<tr><td>Reached: ‘+V(“erR”)+’</td><td>Type: ‘+t.p+’</td><td>’+sv.l+’</td></tr>’;
h+=’<tr><td>Rx: ‘+V(“rxT”)+’</td><td>’+V(“own”)+’</td><td>Dx: ‘+cc+’</td></tr></table>’;
h+=’<h2>SECTION 1: EVENT DESCRIPTION</h2>’;
h+=’<div class="row"><b>Event:</b>’+ev+’</div>’;
h+=’<div class="row"><b>Date/Time:</b>’+fD(V(“iD”))+”, “+(V(“iT”)||“N/A”)+“H, “+V(“sh”)+’</div>’;
h+=’<div class="row"><b>Location:</b>’+ward+’</div>’;
h+=’<div class="row"><b>Reporting:</b>OVR + SPSC portal per MOH/MSPP/0007/01</div>’;
h+=’<h2>SECTION 2: CAUSAL FACTORS</h2>’;
h+=’<div class="row"><b>Factors:</b>1. Knowledge deficit re: ‘+t.l+’ and CBAHI ‘+t.c+’ | 2. Cognitive overload | 3. Communication barriers | 4. System pressure</div>’;
h+=’<div class="row"><b>Training:</b>’+t.l+’ prevention not in CME framework</div>’;
h+=’<div class="row"><b>Competence:</b>Gap in ‘+t.l.toLowerCase()+’ prevention</div>’;
h+=’<h2>SECTION 3: PROCESS AND SYSTEMS</h2>’;
h+=’<div class="row"><b>Process:</b>Failure at ‘+stage.toLowerCase()+’. Defense-in-depth needed</div>’;
h+=’<div class="row"><b>Technology:</b>No CPOE/BCMA/eMAR. Investment recommended</div>’;
h+=’<div class="row"><b>Policy:</b>CBAHI ‘+t.c+’ exists. Implementation gap</div>’;
h+=’<h3>FORMAL RECOMMENDATIONS</h3>’;
h+=’<table><tr><th>#</th><th>Category</th><th>Recommendation</th><th>Timeline</th></tr>’;
h+=’<tr><td>1</td><td><b>Education</b></td><td>CME on ‘+t.l+’. CBAHI ‘+t.c+’. Competency verification.</td><td>14 days</td></tr>’;
h+=’<tr><td>2</td><td><b>Process</b></td><td>Redesign ‘+stage.toLowerCase()+’ workflow.</td><td>30 days</td></tr>’;
h+=’<tr><td>3</td><td><b>Governance</b></td><td>Monthly PT&C dashboard.</td><td>30 days</td></tr>’;
h+=’<tr><td>4</td><td><b>Culture</b></td><td>Non-punitive reporting. Safety huddles.</td><td>60 days</td></tr></table>’;
h+=’<h3>ROOT CAUSE AND ACTION PLAN</h3>’;
h+=’<table><tr><th>Root Cause</th><th>Strategy</th><th>Responsible</th><th>Target</th></tr>’;
h+=’<tr><td rowspan="3">’+t.r+’</td><td>1. Education within 14 days</td><td rowspan="3">’+resp+’</td><td rowspan="3">’+fD(V(“dC”))+’</td></tr>’;
h+=’<tr><td>2. Workflow redesign within 30 days</td></tr>’;
h+=’<tr><td>3. Monthly audit starting 60 days</td></tr></table>’;
h+=’<h3>NCC MERP SEVERITY</h3>’;
h+=’<div class="sev"><b>’+sv.l+’ - ‘+sv.d+’</b><br>Justification: ‘+sv.j+’</div>’;
h+=’<h3>CORRECTIVE ACTION PLAN</h3>’;
h+=’<p style="font-size:11px">Immediate (72hrs): Memo to ‘+resp+’ and ‘+ward+’ staff. SPSC reporting. Short-term (14d): CME. Medium-term (30d): Workflow redesign. Sustained: Monthly audits, quarterly PT&C.</p>’;
h+=’<h3>ISHIKAWA FISHBONE DIAGRAM</h3>’;
