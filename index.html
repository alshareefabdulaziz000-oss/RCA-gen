<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RCA Generator - Aseer Health Cluster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f4f8;color:#1a2332}
header{background:linear-gradient(135deg,#0369a1,#0c4a6e);color:#fff;padding:18px 16px;text-align:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(3,105,161,.4)}
header h1{font-size:17px;font-weight:800}header p{font-size:10px;opacity:.75;margin-top:2px}
.w{max-width:640px;margin:0 auto;padding:12px}
.c{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e2e8f0}
.ct{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #38bdf8}
.r{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.rf{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:2px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:13px;background:#f8fafc}
input:focus,select:focus,textarea:focus{outline:none;border-color:#0369a1;box-shadow:0 0 0 3px rgba(3,105,161,.1)}
textarea{min-height:50px;resize:vertical}
.sr{display:grid;grid-template-columns:110px 1fr;gap:6px;align-items:center;margin-bottom:4px}
.sr span{font-size:10px;font-weight:600;color:#64748b}.sr input{font-size:11px;padding:6px 8px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#15803d,#14532d);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(21,128,61,.3);margin-top:4px;margin-bottom:16px}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.5}
.n{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;font-size:11px;color:#1e40af;margin-bottom:12px;line-height:1.5}
.n b{color:#1e3a8a}
</style>
</head>
<body>
<header><h1>RCA Report Generator</h1><p>SPSC + MOH Policies - Aseer Health Cluster</p></header>
<div class="w">
<div class="n"><b>36 error types</b> (24 SPSC + 12 MOH policy). NCC MERP A-I. Professional PDF output.</div>

<div class="c"><div class="ct">Hospital &amp; Report</div>
<div class="r rf"><div><label>Hospital Name</label><select id="hosp">
<option value="Tubala General Hospital">Tubala General Hospital</option>
<option value="Aseer Central Hospital">Aseer Central Hospital</option>
<option value="Abha Maternity Hospital">Abha Maternity Hospital</option>
<option value="Khamis Mushait General Hospital">Khamis Mushait General Hospital</option>
<option value="Muhayil General Hospital">Muhayil General Hospital</option>
<option value="Sarat Abidah General Hospital">Sarat Abidah General Hospital</option>
<option value="Tanomah General Hospital">Tanomah General Hospital</option>
<option value="Rijal Almaa General Hospital">Rijal Almaa General Hospital</option>
<option value="Balqarn General Hospital">Balqarn General Hospital</option>
<option value="Bisha General Hospital">Bisha General Hospital</option>
<option value="Tathlith General Hospital">Tathlith General Hospital</option>
<option value="Al Namas General Hospital">Al Namas General Hospital</option>
<option value="Ahad Rafidah General Hospital">Ahad Rafidah General Hospital</option>
<option value="Al Majardah General Hospital">Al Majardah General Hospital</option>
<option value="Dhahran Al Janoub General Hospital">Dhahran Al Janoub General Hospital</option>
<option value="other">Other (type below)</option>
</select></div></div>
<div class="r rf" id="hospOR" style="display:none"><div><label>Other Hospital</label><input id="hospO"></div></div>
<div class="r"><div><label>RCA Type</label><select id="rcaT"><option value="Accelerated">Accelerated</option><option value="Formal">Formal</option></select></div>
<div><label>Error Reached Patient?</label><select id="erR"><option value="NO">NO</option><option value="YES">YES</option></select></div></div>
<div class="r"><div><label>Date Initiated</label><input type="date" id="dI"></div><div><label>Date Completed</label><input type="date" id="dC"></div></div>
<div class="r"><div><label>Prescription Type</label><select id="rxT"><option>Wasfaty</option><option>Other</option></select></div>
<div><label>Ownership</label><select id="own"><option>Ministry of Health</option><option>Private</option><option>Military</option></select></div></div></div>

<div class="c"><div class="ct">Patient</div>
<div class="r"><div><label>Patient Name</label><input id="pN"></div><div><label>MRN</label><input id="mrn"></div></div>
<div class="r r3"><div><label>Age</label><input type="number" id="age"></div><div><label>Gender</label><select id="gen"><option value="Male">Male</option><option value="Female">Female</option></select></div><div><label>Location</label><select id="ward">
<option>ER Adult</option><option>ER Pediatric</option><option>ER Maternity</option><option>Male Medical Ward</option><option>Female Medical Ward</option><option>Male Surgery Ward</option><option>Female Surgery Ward</option><option>ICU</option><option>NICU</option><option>PICU</option><option>Pediatric Ward</option><option>OBGYN Ward</option><option>Oncology Unit</option><option>Operation Unit</option><option>Recovery Room</option><option>Day Surgery</option><option>Burn Unit</option><option>Outpatient Pharmacy</option><option>Inpatient Pharmacy</option><option>Satellite Pharmacy</option><option>Labor and Delivery</option><option>Cardiology Clinic</option><option>Internal Medicine Clinic</option><option>Pediatric Clinic</option><option>Surgery Clinic</option><option>ENT Clinic</option><option>Dermatology Clinic</option><option>OBGYN Clinic</option><option>Dental Clinic</option><option>Orthopedic Clinic</option><option>Opthalmology Clinic</option><option>Neuro Clinic</option><option>Urology Clinic</option><option>Psychiatry Clinic</option><option>Chronic Disease Clinic</option><option>Family Clinic</option><option>Vaccination Clinic</option><option>Blood Bank</option><option>Laboratory</option>
</select></div></div>
<div class="r rf"><div><label>Diagnosis</label><input id="cc"></div></div></div>

<div class="c"><div class="ct">Error Details</div>
<div class="r"><div><label>Stage</label><select id="stg">
<option>Prescribing</option><option>Transcribing</option><option>Dispensing</option><option>Preparation</option><option>Administration</option><option>Monitoring</option>
</select></div><div><label>Error Type</label><select id="eT"></select></div></div>
<div class="r rf"><div><label>Medication(s)</label><input id="meds"></div></div>
<div class="r rf"><div><label>Description</label><textarea id="notes" rows="3"></textarea></div></div>
<div class="r rf"><div><label>Action Taken (SPSC)</label><select id="act" multiple size="4">
<option>Access patient condition and take necessary actions</option>
<option>Arrangement in area/shelves/workflow</option>
<option>Call physician to complete missing information</option>
<option>Policies and procedures changed/improved</option>
<option>Staff awareness (email, lectures)</option>
<option>Electronic systems fixed/improved</option>
<option>Inform all staff about policies</option>
<option>Patient counseling improved</option>
<option>Inform staff involved in safety event</option>
<option>Report error to supervisor</option>
<option>Inform patient/caregiver about safety event</option>
<option>Root cause analysis</option>
<option>Communication process improved</option>
<option>Education/training provided</option>
<option>Environment modified</option>
</select><small style="color:#94a3b8;font-size:9px">Hold Ctrl/Cmd for multiple</small></div></div>
<div class="r r3"><div><label>Date</label><input type="date" id="iD"></div><div><label>Time</label><input type="time" id="iT"></div><div><label>Shift</label><select id="sh"><option>PM</option><option>AM</option><option>Night</option></select></div></div></div>

<div class="c"><div class="ct">NCC MERP Severity</div>
<div class="r rf"><div><label>Category</label><select id="sev"></select></div></div>
<div class="r rf"><div><label>Responsible Person</label><input id="resp"></div></div></div>

<div class="c"><div class="ct">Signatures</div>
<div class="sr"><span>Prepared by:</span><input id="s1"></div>
<div class="sr"><span>Title:</span><input id="s1r"></div>
<div class="sr"><span>Pharm Mgr:</span><input id="s2"></div>
<div class="sr"><span>Quality:</span><input id="s3"></div>
<div class="sr"><span>Dir QM:</span><input id="s4"></div>
<div class="sr"><span>Med Dir:</span><input id="s5"></div></div>

<button class="btn" id="gB" onclick="go()">Generate RCA Report (PDF)</button>

</div>
<script>
// Populate dropdowns from data.js
var eT=document.getElementById("eT");
var cur="";
D.e.forEach(function(e,i){
if(e.s!==cur){cur=e.s;var og=document.createElement("optgroup");og.label=cur;eT.appendChild(og);}
var o=document.createElement("option");o.value=i;o.textContent=e.l;eT.appendChild(o);
});
var sevEl=document.getElementById("sev");
D.sev.forEach(function(s,i){
var o=document.createElement("option");o.value=i;o.textContent=s.l+" - "+s.d;sevEl.appendChild(o);
});
// Dates
var now=new Date(),iso=now.toISOString().split("T")[0];
document.getElementById("dI").value=iso;
document.getElementById("iD").value=iso;
var c2=new Date(now);c2.setDate(c2.getDate()+4);
document.getElementById("dC").value=c2.toISOString().split("T")[0];
// Hospital toggle
document.getElementById("hosp").addEventListener("change",function(){
document.getElementById("hospOR").style.display=this.value==="other"?"block":"none";
});
</script>
</body>
</html>
